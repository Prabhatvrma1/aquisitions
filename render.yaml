services:
  - type: web
    name: acquisitions-api
    env: node
    buildCommand: npm install
    preDeployCommand: npm run db:migrate
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ARCJET_KEY
        sync: false
